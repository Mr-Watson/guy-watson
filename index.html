<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>stack.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray: #8a8a8a;
    --light: #efefef;
    --border: #d4d4d4;
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--black);
    font-family: var(--sans);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ─── Layout ─── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── Header ─── */
  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header span.tagline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.05em;
  }

  /* ─── Screens ─── */
  .screen {
    display: none;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: flex; flex-direction: column; }

  /* ─── Home / Scan screen ─── */
  #screen-scan {
    align-items: stretch;
  }

  .scan-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    gap: 30px;
  }

  #scanner-viewport {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 4/3;
    position: relative;
    border: 1px solid var(--border);
    overflow: hidden;
    background: #000;
  }

  #scanner-viewport video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #scanner-viewport canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .scan-crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 70px;
    pointer-events: none;
    z-index: 2;
  }

  .scan-crosshair::before,
  .scan-crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.8);
  }

  /* corner marks */
  .corner { position: absolute; width: 18px; height: 18px; }
  .corner.tl { top: 0; left: 0; border-top: 2px solid #fff; border-left: 2px solid #fff; }
  .corner.tr { top: 0; right: 0; border-top: 2px solid #fff; border-right: 2px solid #fff; }
  .corner.bl { bottom: 0; left: 0; border-bottom: 2px solid #fff; border-left: 2px solid #fff; }
  .corner.br { bottom: 0; right: 0; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }

  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.7);
    animation: scan-sweep 2s ease-in-out infinite;
  }

  @keyframes scan-sweep {
    0%, 100% { top: 5%; }
    50% { top: 85%; }
  }

  #scanner-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  .scan-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 340px;
  }

  #btn-scan {
    width: 100%;
    padding: 14px;
    background: var(--black);
    color: var(--white);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
  }

  #btn-scan:active { opacity: 0.8; }
  #btn-scan.scanning { background: var(--white); color: var(--black); border: 1px solid var(--black); }

  .divider-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.08em;
  }

  .manual-row {
    display: flex;
    width: 100%;
    gap: 0;
    border: 1px solid var(--border);
  }

  #manual-input {
    flex: 1;
    padding: 12px 14px;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    background: var(--white);
    color: var(--black);
  }

  #manual-input::placeholder { color: var(--gray); }

  #btn-manual-search {
    padding: 12px 16px;
    background: var(--white);
    border: none;
    border-left: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    color: var(--black);
  }

  #btn-manual-search:active { background: var(--light); }

  /* ─── Search Results ─── */
  #screen-results {
    padding: 0;
  }

  .results-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-back {
    font-family: var(--mono);
    font-size: 11px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray);
    letter-spacing: 0.05em;
    padding: 0;
    text-transform: uppercase;
  }

  .btn-back:hover { color: var(--black); }

  .results-header h2 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.2px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #results-list {
    flex: 1;
    overflow-y: auto;
  }

  .book-card {
    display: flex;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .book-cover {
    width: 54px;
    flex-shrink: 0;
  }

  .book-cover img {
    width: 54px;
    display: block;
    border: 1px solid var(--border);
  }

  .book-cover-placeholder {
    width: 54px;
    aspect-ratio: 2/3;
    background: var(--light);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--gray);
  }

  .book-meta {
    flex: 1;
    min-width: 0;
  }

  .book-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 3px;
  }

  .book-author {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 6px;
    font-family: var(--sans);
  }

  .book-desc {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .book-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-add {
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 1px solid var(--black);
    background: var(--white);
    cursor: pointer;
    color: var(--black);
  }

  .btn-add:active { background: var(--light); }
  .btn-add.added { background: var(--black); color: var(--white); }
  .btn-add:disabled { opacity: 0.4; cursor: default; }

  /* ─── Library screens ─── */
  .list-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .list-header h2 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .list-header p {
    font-size: 12px;
    color: var(--gray);
    margin-top: 2px;
    font-family: var(--mono);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px 30px;
    text-align: center;
  }

  .empty-state .symbol {
    font-family: var(--mono);
    font-size: 32px;
    color: var(--border);
  }

  .empty-state p {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    flex: 1;
    align-content: start;
  }

  .grid-book {
    aspect-ratio: 2/3;
    position: relative;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
  }

  .grid-book:nth-child(4n) { border-right: none; }

  .grid-book img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .grid-book-placeholder {
    width: 100%;
    height: 100%;
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .grid-book-placeholder span {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--gray);
    text-align: center;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .grid-book-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.75);
    padding: 6px;
    transform: translateY(100%);
    transition: transform 0.15s ease;
  }

  .grid-book:hover .grid-book-overlay,
  .grid-book.detail-open .grid-book-overlay {
    transform: translateY(0);
  }

  .grid-book-overlay .title {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--white);
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ─── Book detail sheet ─── */
  .book-detail-sheet {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }

  .book-detail-sheet.open { display: flex; }

  .sheet-content {
    background: var(--white);
    width: 100%;
    max-height: 85dvh;
    overflow-y: auto;
    padding: 0;
    border-top: 2px solid var(--black);
    max-width: 480px;
    margin: 0 auto;
  }

  .sheet-header {
    display: flex;
    gap: 16px;
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sheet-header img {
    width: 70px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .sheet-info { flex: 1; }

  .sheet-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 4px;
  }

  .sheet-author {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 8px;
  }

  .sheet-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 3px 8px;
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .sheet-desc {
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.65;
    color: #333;
    border-bottom: 1px solid var(--border);
  }

  .sheet-actions {
    padding: 16px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-sheet {
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--black);
    background: var(--white);
    cursor: pointer;
    color: var(--black);
  }

  .btn-sheet.primary { background: var(--black); color: var(--white); }
  .btn-sheet.danger { border-color: #999; color: #999; }
  .btn-sheet:active { opacity: 0.7; }

  /* ─── Bottom nav ─── */
  nav {
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--white);
  }

  .nav-btn {
    flex: 1;
    padding: 14px 8px 12px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-right: 1px solid var(--border);
  }

  .nav-btn:last-child { border-right: none; }

  .nav-btn .nav-icon {
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1;
    color: var(--gray);
  }

  .nav-btn .nav-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .nav-btn.active .nav-icon,
  .nav-btn.active .nav-label { color: var(--black); }

  .nav-badge {
    position: relative;
    display: inline-block;
  }

  .nav-badge::after {
    content: attr(data-count);
    position: absolute;
    top: -5px;
    right: -10px;
    font-size: 9px;
    font-family: var(--mono);
    color: var(--gray);
  }

  /* ─── Toast ─── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--black);
    color: var(--white);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 10px 18px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
    max-width: 320px;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div id="app">

  <header>
    <h1>stack.</h1>
    <span class="tagline">// book scanner</span>
  </header>

  <!-- ── SCAN SCREEN ── -->
  <div id="screen-scan" class="screen active">
    <div class="scan-area">
      <div id="scanner-viewport">
        <video id="video-preview" playsinline autoplay muted></video>
        <canvas id="scan-canvas"></canvas>
        <div class="scan-crosshair">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line" id="scan-line"></div>
        </div>
      </div>
      <div id="scanner-status">— tap scan to start —</div>
      <div class="scan-controls">
        <button id="btn-scan">[ scan barcode ]</button>
        <span class="divider-text">or</span>
        <div class="manual-row">
          <input type="text" id="manual-input" placeholder="title / author / isbn" autocomplete="off" autocorrect="off" spellcheck="false">
          <button id="btn-manual-search">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── RESULTS SCREEN ── -->
  <div id="screen-results" class="screen">
    <div class="results-header">
      <button class="btn-back" id="btn-back-from-results">← back</button>
      <h2 id="results-title">results</h2>
    </div>
    <div id="results-list"></div>
  </div>

  <!-- ── LIBRARY SCREEN ── -->
  <div id="screen-library" class="screen">
    <div class="list-header">
      <h2>library</h2>
      <p id="library-count">0 books</p>
    </div>
    <div id="library-grid" class="books-grid"></div>
    <div id="library-empty" class="empty-state" style="display:none">
      <div class="symbol">[ ]</div>
      <p>your library is empty<br>scan books to add them</p>
    </div>
  </div>

  <!-- ── TBR SCREEN ── -->
  <div id="screen-tbr" class="screen">
    <div class="list-header">
      <h2>to be read</h2>
      <p id="tbr-count">0 books</p>
    </div>
    <div id="tbr-grid" class="books-grid"></div>
    <div id="tbr-empty" class="empty-state" style="display:none">
      <div class="symbol">[ ]</div>
      <p>nothing queued<br>add books you want to read</p>
    </div>
  </div>

  <!-- ── WANT SCREEN ── -->
  <div id="screen-want" class="screen">
    <div class="list-header">
      <h2>want list</h2>
      <p id="want-count">0 books</p>
    </div>
    <div id="want-grid" class="books-grid"></div>
    <div id="want-empty" class="empty-state" style="display:none">
      <div class="symbol">[ ]</div>
      <p>wishlist is empty<br>scan books in shops to save them</p>
    </div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav>
    <button class="nav-btn active" data-screen="scan">
      <span class="nav-icon">⊕</span>
      <span class="nav-label">scan</span>
    </button>
    <button class="nav-btn" data-screen="library">
      <span class="nav-icon nav-badge" id="nav-library-badge">▦</span>
      <span class="nav-label">library</span>
    </button>
    <button class="nav-btn" data-screen="tbr">
      <span class="nav-icon nav-badge" id="nav-tbr-badge">⊡</span>
      <span class="nav-label">tbr</span>
    </button>
    <button class="nav-btn" data-screen="want">
      <span class="nav-icon nav-badge" id="nav-want-badge">◇</span>
      <span class="nav-label">want</span>
    </button>
  </nav>

</div>

<!-- ── BOOK DETAIL SHEET ── -->
<div id="book-detail-sheet" class="book-detail-sheet">
  <div class="sheet-content">
    <div class="sheet-header">
      <img id="sheet-cover" src="" alt="">
      <div class="sheet-info">
        <div class="sheet-title" id="sheet-title"></div>
        <div class="sheet-author" id="sheet-author"></div>
        <div class="sheet-badges" id="sheet-badges"></div>
      </div>
    </div>
    <div class="sheet-desc" id="sheet-desc"></div>
    <div class="sheet-actions" id="sheet-actions"></div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ZXing barcode library -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>

<script>
'use strict';

// ─── State ─────────────────────────────────────────────────────────────────

const DB = {
  get(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }
};

let library = DB.get('stack_library');
let tbr     = DB.get('stack_tbr');
let wantList = DB.get('stack_want');

let scannerActive = false;
let codeReader = null;
let scannerStream = null;
let scannerLoop = null;
let lastDecodeAttempt = 0;
let currentDetailBook = null;

// ─── Navigation ────────────────────────────────────────────────────────────

const navBtns  = document.querySelectorAll('.nav-btn');
const screens  = document.querySelectorAll('.screen');
let currentScreen = 'scan';

function showScreen(name) {
  screens.forEach(s => s.classList.remove('active'));
  navBtns.forEach(b => b.classList.remove('active'));
  const s = document.getElementById('screen-' + name);
  if (s) s.classList.add('active');
  const b = document.querySelector(`.nav-btn[data-screen="${name}"]`);
  if (b) b.classList.add('active');
  currentScreen = name;
  if (name !== 'scan') stopScanner();
  if (name === 'library') renderGrid('library');
  if (name === 'tbr')     renderGrid('tbr');
  if (name === 'want')    renderGrid('want');
}

navBtns.forEach(btn => {
  btn.addEventListener('click', () => showScreen(btn.dataset.screen));
});

document.getElementById('btn-back-from-results').addEventListener('click', () => {
  showScreen('scan');
});

// ─── Toast ─────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Scanner ───────────────────────────────────────────────────────────────

const btnScan   = document.getElementById('btn-scan');
const statusEl  = document.getElementById('scanner-status');
const videoEl   = document.getElementById('video-preview');
const scanLine  = document.getElementById('scan-line');

btnScan.addEventListener('click', () => {
  if (scannerActive) stopScanner();
  else startScanner();
});

async function startScanner() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('Camera API not available. Use HTTPS and a supported browser.');
    }

    scannerActive = true;
    btnScan.textContent = '[ stop scanning ]';
    btnScan.classList.add('scanning');
    statusEl.textContent = '— starting camera —';
    scanLine.style.display = 'block';

    // Prefer native browser barcode detection where available. It is much better on phones.
    if ('BarcodeDetector' in window) {
      const supported = await BarcodeDetector.getSupportedFormats().catch(() => []);
      const requested = ['ean_13', 'ean_8', 'upc_a', 'upc_e'];
      const formats = requested.filter(f => supported.includes(f));
      const detector = new BarcodeDetector({ formats: formats.length ? formats : undefined });

      scannerStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      videoEl.srcObject = scannerStream;
      await videoEl.play();
      statusEl.textContent = '— scanning —';

      const scanFrame = async (time) => {
        if (!scannerActive) return;

        // Do not hammer the detector every animation frame.
        if (time - lastDecodeAttempt > 250 && videoEl.readyState >= 2) {
          lastDecodeAttempt = time;
          try {
            const barcodes = await detector.detect(videoEl);
            if (barcodes && barcodes.length) {
              const code = String(barcodes[0].rawValue || '').trim();
              if (code) {
                stopScanner();
                statusEl.textContent = '— found: ' + code + ' —';
                searchBooks(code, true);
                return;
              }
            }
          } catch (decodeErr) {
            console.warn('Native decode warning:', decodeErr);
          }
        }

        scannerLoop = requestAnimationFrame(scanFrame);
      };

      scannerLoop = requestAnimationFrame(scanFrame);
      return;
    }

    // Fallback for browsers without BarcodeDetector.
    if (!window.ZXing) throw new Error('ZXing library not loaded');

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    codeReader = new ZXing.BrowserMultiFormatReader(hints, 300);

    let deviceId;
    try {
      const devices = await codeReader.listVideoInputDevices();
      const backCam = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
      deviceId = backCam ? backCam.deviceId : undefined;
    } catch (deviceError) {
      console.warn('Could not list cameras, falling back to default camera:', deviceError);
    }

    statusEl.textContent = '— scanning —';

    await codeReader.decodeFromVideoDevice(deviceId, videoEl, (result, err) => {
      if (result) {
        const code = String(result.getText() || '').trim();
        if (code) {
          stopScanner();
          statusEl.textContent = '— found: ' + code + ' —';
          searchBooks(code, true);
        }
      }
      if (err && window.ZXing && ZXing.NotFoundException && !(err instanceof ZXing.NotFoundException)) {
        console.warn('Scanner warning:', err);
      }
    });
  } catch (e) {
    console.error('Scanner failed:', e);
    statusEl.textContent = '— camera unavailable —';
    stopScanner();
    showToast('Camera unavailable — use HTTPS and allow camera');
  }
}
function stopScanner() {
  if (scannerLoop) {
    try { cancelAnimationFrame(scannerLoop); } catch {}
    scannerLoop = null;
  }
  if (scannerStream) {
    try { scannerStream.getTracks().forEach(track => track.stop()); } catch {}
    scannerStream = null;
  }
  if (videoEl) {
    try { videoEl.pause(); videoEl.srcObject = null; } catch {}
  }
  if (codeReader) {
    try { codeReader.reset(); } catch {}
    codeReader = null;
  }
  scannerActive = false;
  btnScan.textContent = '[ scan barcode ]';
  btnScan.classList.remove('scanning');
  if (statusEl.textContent === '— scanning —' || statusEl.textContent === '— starting camera —') statusEl.textContent = '— tap scan to start —';
  scanLine.style.display = 'none';
}
// ─── Manual search ─────────────────────────────────────────────────────────

const manualInput = document.getElementById('manual-input');
const btnManual   = document.getElementById('btn-manual-search');

btnManual.addEventListener('click', () => doManualSearch());
manualInput.addEventListener('keydown', e => { if (e.key === 'Enter') doManualSearch(); });

function doManualSearch() {
  const q = manualInput.value.trim();
  if (!q) return;
  searchBooks(q, false);
}

// ─── Google Books API ──────────────────────────────────────────────────────

async function searchBooks(query, isISBN) {
  statusEl.textContent = '— searching —';

  const raw = String(query || '').trim();
  if (!raw) return;

  const cleanedISBN = raw.replace(/[^0-9Xx]/g, '');
  const looksLikeISBN = /^[0-9Xx\-\s]{8,24}$/.test(raw) && (cleanedISBN.length === 10 || cleanedISBN.length === 13);
  const googleTerm = (isISBN || looksLikeISBN) ? `isbn:${cleanedISBN}` : raw;

  try {
    let items = await searchGoogleBooks(googleTerm);

    // Fallback because Google Books can return no items for some UK editions/barcodes.
    if (!items.length) {
      items = await searchOpenLibrary(raw, isISBN || looksLikeISBN, cleanedISBN);
    }

    if (!items.length) {
      showToast('No results found');
      statusEl.textContent = '— no results —';
      return;
    }

    renderResults(raw, items);
    showScreen('results');
    document.getElementById('results-title').textContent = (isISBN || looksLikeISBN)
      ? `isbn: ${cleanedISBN || raw}`
      : `"${raw}"`;

    statusEl.textContent = '— tap scan to start —';
  } catch (e) {
    console.error('Search failed:', e);
    showToast('Search failed — check console');
    statusEl.textContent = '— error —';
  }
}

async function searchGoogleBooks(term) {
  const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(term)}&maxResults=20&printType=books`;
  console.log('Google Books URL:', url);

  const res = await fetch(url, { mode: 'cors' });
  if (!res.ok) throw new Error(`Google Books returned ${res.status}`);

  const data = await res.json();
  console.log('Google Books response:', data);

  return (data.items || []).map(buildGoogleBook).filter(Boolean);
}

async function searchOpenLibrary(raw, isISBN, cleanedISBN) {
  const url = isISBN
    ? `https://openlibrary.org/isbn/${encodeURIComponent(cleanedISBN)}.json`
    : `https://openlibrary.org/search.json?q=${encodeURIComponent(raw)}&limit=20`;

  console.log('Open Library URL:', url);

  const res = await fetch(url, { mode: 'cors' });
  if (!res.ok) return [];
  const data = await res.json();
  console.log('Open Library response:', data);

  if (isISBN && data && data.title) {
    return [buildOpenLibraryBook(data, cleanedISBN)];
  }

  return (data.docs || []).map(buildOpenLibrarySearchBook).filter(Boolean);
}

function buildGoogleBook(item) {
  if (!item || !item.volumeInfo) return null;
  const v = item.volumeInfo;
  const thumb = v.imageLinks
    ? (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || null)
    : null;
  const cover = thumb ? thumb.replace('http:', 'https:').replace('zoom=1', 'zoom=2') : null;

  return {
    id: 'gb_' + item.id,
    title: v.title || 'Unknown Title',
    authors: v.authors ? v.authors.join(', ') : 'Unknown Author',
    description: v.description || '',
    cover,
    genres: v.categories || [],
    year: v.publishedDate ? v.publishedDate.slice(0, 4) : '',
  };
}

function buildOpenLibraryBook(item, isbn) {
  const cover = isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-M.jpg` : null;
  return {
    id: 'ol_' + (item.key || isbn || item.title),
    title: item.title || 'Unknown Title',
    authors: Array.isArray(item.authors) ? item.authors.map(a => a.name || a.key).join(', ') : 'Unknown Author',
    description: typeof item.description === 'string' ? item.description : (item.description && item.description.value) || '',
    cover,
    genres: item.subjects || [],
    year: item.publish_date ? String(item.publish_date).slice(0, 4) : '',
  };
}

function buildOpenLibrarySearchBook(doc) {
  const cover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg` : null;
  return {
    id: 'ol_' + (doc.key || doc.edition_key?.[0] || doc.title),
    title: doc.title || 'Unknown Title',
    authors: doc.author_name ? doc.author_name.join(', ') : 'Unknown Author',
    description: '',
    cover,
    genres: doc.subject ? doc.subject.slice(0, 4) : [],
    year: doc.first_publish_year ? String(doc.first_publish_year) : '',
  };
}
// ─── Render Results ─────────────────────────────────────────────────────────

function renderResults(query, items) {
  const list = document.getElementById('results-list');
  list.innerHTML = '';

  items.forEach(item => {
    const book = buildBook(item);
    const inLib  = library.some(b => b.id === book.id);
    const inTBR  = tbr.some(b => b.id === book.id);
    const inWant = wantList.some(b => b.id === book.id);

    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover">
        ${book.cover
          ? `<img src="${book.cover}" alt="${esc(book.title)}" loading="lazy">`
          : `<div class="book-cover-placeholder">§</div>`}
      </div>
      <div class="book-meta">
        <div class="book-title">${esc(book.title)}</div>
        <div class="book-author">${esc(book.authors)}${book.year ? ' · ' + book.year : ''}</div>
        ${book.description ? `<div class="book-desc">${esc(book.description)}</div>` : ''}
        <div class="book-actions">
          <button class="btn-add btn-lib ${inLib ? 'added' : ''}" ${inLib ? 'disabled' : ''} data-id="${book.id}">
            ${inLib ? '✓ library' : '+ library'}
          </button>
          <button class="btn-add btn-tbr ${inTBR ? 'added' : ''}" ${inTBR ? 'disabled' : ''} data-id="${book.id}">
            ${inTBR ? '✓ tbr' : '+ tbr'}
          </button>
          <button class="btn-add btn-want ${inWant ? 'added' : ''}" ${inWant ? 'disabled' : ''} data-id="${book.id}">
            ${inWant ? '✓ want' : '+ want'}
          </button>
        </div>
      </div>
    `;

    // Bind buttons
    card.querySelector('.btn-lib').addEventListener('click', e => {
      addBook('library', book);
      e.target.textContent = '✓ library';
      e.target.classList.add('added');
      e.target.disabled = true;
    });

    card.querySelector('.btn-tbr').addEventListener('click', e => {
      addBook('tbr', book);
      e.target.textContent = '✓ tbr';
      e.target.classList.add('added');
      e.target.disabled = true;
    });

    card.querySelector('.btn-want').addEventListener('click', e => {
      addBook('want', book);
      e.target.textContent = '✓ want';
      e.target.classList.add('added');
      e.target.disabled = true;
    });

    list.appendChild(card);
  });
}

// ─── Add / Remove ───────────────────────────────────────────────────────────

function addBook(list, book) {
  const lists = { library, tbr, want: wantList };
  const keys  = { library: 'stack_library', tbr: 'stack_tbr', want: 'stack_want' };
  const arr   = lists[list];
  if (arr.some(b => b.id === book.id)) return;
  arr.push(book);
  DB.set(keys[list], arr);
  updateBadges();
  showToast(`added to ${list === 'want' ? 'want list' : list}`);
}

function removeBook(list, id) {
  const keys  = { library: 'stack_library', tbr: 'stack_tbr', want: 'stack_want' };
  const arr   = { library, tbr, want: wantList }[list];
  const idx   = arr.findIndex(b => b.id === id);
  if (idx === -1) return;
  arr.splice(idx, 1);
  DB.set(keys[list], arr);
  updateBadges();
}

function moveBook(fromList, toList, id) {
  const arrs = { library, tbr, want: wantList };
  const book = arrs[fromList].find(b => b.id === id);
  if (!book) return;
  removeBook(fromList, id);
  addBook(toList, book);
}

// ─── Render Grid ────────────────────────────────────────────────────────────

function renderGrid(listName) {
  const arrs   = { library, tbr, want: wantList };
  const counts = { library: 'library-count', tbr: 'tbr-count', want: 'want-count' };
  const grids  = { library: 'library-grid', tbr: 'tbr-grid', want: 'want-grid' };
  const empties = { library: 'library-empty', tbr: 'tbr-empty', want: 'want-empty' };

  const books = arrs[listName];
  const count = books.length;

  document.getElementById(counts[listName]).textContent = count + (count === 1 ? ' book' : ' books');

  const grid  = document.getElementById(grids[listName]);
  const empty = document.getElementById(empties[listName]);
  grid.innerHTML = '';

  if (count === 0) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  books.forEach(book => {
    const cell = document.createElement('div');
    cell.className = 'grid-book';
    cell.innerHTML = book.cover
      ? `<img src="${book.cover}" alt="${esc(book.title)}" loading="lazy">
         <div class="grid-book-overlay"><div class="title">${esc(book.title)}</div></div>`
      : `<div class="grid-book-placeholder"><span>${esc(book.title)}</span></div>
         <div class="grid-book-overlay"><div class="title">${esc(book.title)}</div></div>`;
    cell.addEventListener('click', () => openDetail(book, listName));
    grid.appendChild(cell);
  });
}

// ─── Detail Sheet ───────────────────────────────────────────────────────────

const sheet = document.getElementById('book-detail-sheet');

function openDetail(book, listName) {
  currentDetailBook = { book, listName };

  document.getElementById('sheet-cover').src = book.cover || '';
  document.getElementById('sheet-cover').style.display = book.cover ? '' : 'none';
  document.getElementById('sheet-title').textContent = book.title;
  document.getElementById('sheet-author').textContent = book.authors + (book.year ? ' · ' + book.year : '');
  document.getElementById('sheet-desc').textContent = book.description || 'No description available.';

  const badges = document.getElementById('sheet-badges');
  badges.innerHTML = '';
  if (book.genres.length) {
    book.genres.slice(0,2).forEach(g => {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = g;
      badges.appendChild(b);
    });
  }

  const actions = document.getElementById('sheet-actions');
  actions.innerHTML = '';

  // Move actions depending on current list
  if (listName === 'library') {
    addSheetBtn(actions, 'move to tbr', () => { moveBook('library','tbr',book.id); closeDetail(); renderGrid('library'); showToast('moved to tbr'); });
    addSheetBtn(actions, 'move to want', () => { moveBook('library','want',book.id); closeDetail(); renderGrid('library'); showToast('moved to want list'); });
  } else if (listName === 'tbr') {
    addSheetBtn(actions, 'mark as read', 'primary', () => { moveBook('tbr','library',book.id); closeDetail(); renderGrid('tbr'); showToast('added to library'); });
    addSheetBtn(actions, 'move to want', () => { moveBook('tbr','want',book.id); closeDetail(); renderGrid('tbr'); showToast('moved to want list'); });
  } else if (listName === 'want') {
    addSheetBtn(actions, 'add to library', 'primary', () => { moveBook('want','library',book.id); closeDetail(); renderGrid('want'); showToast('added to library'); });
    addSheetBtn(actions, 'add to tbr', () => { moveBook('want','tbr',book.id); closeDetail(); renderGrid('want'); showToast('added to tbr'); });
  }

  addSheetBtn(actions, 'remove', 'danger', () => {
    removeBook(listName, book.id);
    closeDetail();
    renderGrid(listName);
    showToast('removed');
  });

  sheet.classList.add('open');
}

function addSheetBtn(container, label, cls, fn) {
  // overloaded: (container, label, fn) or (container, label, cls, fn)
  if (typeof cls === 'function') { fn = cls; cls = ''; }
  const b = document.createElement('button');
  b.className = 'btn-sheet ' + (cls || '');
  b.textContent = label;
  b.addEventListener('click', fn);
  container.appendChild(b);
}

function closeDetail() {
  sheet.classList.remove('open');
  currentDetailBook = null;
}

sheet.addEventListener('click', e => {
  if (e.target === sheet) closeDetail();
});

// ─── Badges ─────────────────────────────────────────────────────────────────

function updateBadges() {
  const set = (id, count) => {
    const el = document.getElementById(id);
    if (el) el.dataset.count = count > 0 ? count : '';
  };
  set('nav-library-badge', library.length);
  set('nav-tbr-badge', tbr.length);
  set('nav-want-badge', wantList.length);
}

updateBadges();

// ─── Utility ─────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
