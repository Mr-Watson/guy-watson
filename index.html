<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stack.</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #111; color: #eee; }
    button, input, select { padding: 12px; margin: 6px 0; width: 100%; box-sizing: border-box; }
    .book { border: 1px solid #333; padding: 12px; margin: 10px 0; border-radius: 8px; }
    nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #000; }
    nav button { flex: 1; }
    main { padding-bottom: 80px; }
  </style>
</head>

<body>
  <main>
    <h1>stack.</h1>
    <p>book scanner</p>

    <input id="searchInput" placeholder="Enter ISBN, title, or author" />
    <button onclick="searchBook()">Search book</button>

    <section id="results">
      <h2>Results</h2>
      <div id="resultsList"></div>
    </section>

    <section id="library">
      <h2>Library</h2>
      <div id="libraryList"></div>
    </section>
  </main>

  <script>
    let books = JSON.parse(localStorage.getItem("books")) || [];

    function saveBooks() {
      localStorage.setItem("books", JSON.stringify(books));
      renderLibrary();
    }

    async function searchBook() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      const isISBN = /^[0-9Xx-]+$/.test(query);
      const searchQuery = isISBN ? `isbn:${query.replaceAll("-", "")}` : query;

      const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(searchQuery)}`;

      const response = await fetch(url);
      const data = await response.json();

      const results = document.getElementById("resultsList");
      results.innerHTML = "";

      if (!data.items) {
        results.innerHTML = "<p>No books found.</p>";
        return;
      }

      data.items.slice(0, 5).forEach(item => {
        const info = item.volumeInfo;

        const book = {
          id: item.id,
          title: info.title || "Unknown title",
          authors: info.authors || [],
          thumbnail: info.imageLinks?.thumbnail || "",
          status: "library"
        };

        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML = `
          ${book.thumbnail ? `<img src="${book.thumbnail}" />` : ""}
          <h3>${book.title}</h3>
          <p>${book.authors.join(", ")}</p>
          <button>Add to library</button>
        `;

        div.querySelector("button").onclick = () => {
          books.push(book);
          saveBooks();
        };

        results.appendChild(div);
      });
    }

    function renderLibrary() {
      const list = document.getElementById("libraryList");
      list.innerHTML = "";

      if (books.length === 0) {
        list.innerHTML = "<p>Your library is empty.</p>";
        return;
      }

      books.forEach(book => {
        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML = `
          ${book.thumbnail ? `<img src="${book.thumbnail}" />` : ""}
          <h3>${book.title}</h3>
          <p>${book.authors.join(", ")}</p>
        `;
        list.appendChild(div);
      });
    }

    renderLibrary();
  </script>
</body>
</html>
